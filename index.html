<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  >
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#020304">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>UCB Eyes Live</title>

  <style>
    :root {
      --live: #45d483;
      --warning: #ff9f43;
      --error: #ff6f6f;
      --muted: #a5adb7;
      --safe-top: max(12px, env(safe-area-inset-top));
      --safe-right: max(12px, env(safe-area-inset-right));
      --safe-bottom: max(12px, env(safe-area-inset-bottom));
      --safe-left: max(12px, env(safe-area-inset-left));
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020304;
      color: #f5f7fa;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #020304;
    }

    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #020304;
    }

    .ambient {
      position: absolute;
      inset: -8%;
      z-index: 0;
      width: 116%;
      height: 116%;
      object-fit: cover;
      filter: blur(44px) saturate(0.65) brightness(0.28);
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }

    .ambient.visible {
      opacity: 0.62;
    }

    .frame {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      opacity: 0;
      user-select: none;
      -webkit-user-drag: none;
    }

    .frame.visible {
      opacity: 1;
    }

    .placeholder {
      position: relative;
      z-index: 3;
      width: min(390px, calc(100% - 44px));
      padding: 24px;
      text-align: center;
      transition: opacity 0.18s ease;
    }

    .placeholder.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .placeholder-mark {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
      color: #dce3ea;
    }

    .placeholder-mark svg {
      width: 21px;
      height: 21px;
    }

    .placeholder h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 680;
      letter-spacing: -0.02em;
    }

    .placeholder p {
      margin: 8px 0 0;
      color: #8d96a3;
      font-size: 12px;
      line-height: 1.5;
    }

    .status {
      position: absolute;
      left: var(--safe-left);
      bottom: var(--safe-bottom);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 650;
      line-height: 1;
      text-shadow: 0 1px 6px #000;
      transition: color 0.18s ease, opacity 0.18s ease;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 12px rgba(255, 159, 67, 0.45);
    }

    .status.live {
      color: #d9f5e5;
    }

    .status.live .status-dot {
      background: var(--live);
      box-shadow: 0 0 12px rgba(69, 212, 131, 0.5);
    }

    .status.warning {
      color: #ffd1a1;
    }

    .status.warning .status-dot {
      background: var(--warning);
      box-shadow: 0 0 12px rgba(255, 159, 67, 0.5);
    }

    .status.error {
      color: #ffaaa7;
    }

    .status.error .status-dot {
      background: var(--error);
      box-shadow: 0 0 12px rgba(255, 111, 111, 0.55);
    }

    .fullscreen-button {
      position: absolute;
      right: var(--safe-right);
      bottom: var(--safe-bottom);
      z-index: 20;
      width: 42px;
      height: 42px;
      padding: 0;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50%;
      background: rgba(3, 5, 7, 0.5);
      color: #f4f6f8;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      transition: opacity 0.18s ease, transform 0.08s ease;
    }

    .fullscreen-button:active {
      transform: scale(0.95);
    }

    .fullscreen-button svg {
      width: 19px;
      height: 19px;
    }

    .loading {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 40;
      width: 100%;
      height: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .loading.active {
      opacity: 1;
    }

    .loading::before {
      content: "";
      position: absolute;
      left: -35%;
      top: 0;
      width: 35%;
      height: 100%;
      background: linear-gradient(90deg, transparent, #a8b7c5, transparent);
      animation: sweep 1s linear infinite;
    }

    @keyframes sweep {
      to {
        left: 100%;
      }
    }

    body.force-landscape .app {
      left: 50%;
      top: 50%;
      right: auto;
      bottom: auto;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      transform-origin: center;
    }

    body.fullscreen-view .status,
    body.fullscreen-view .fullscreen-button {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="loading" id="loading"></div>

    <main class="stage" id="stage">
      <img class="ambient" id="ambient" alt="" aria-hidden="true">
      <img class="frame" id="frame" alt="UCB Eyes live screen">

      <section class="placeholder" id="placeholder">
        <div class="placeholder-mark" aria-hidden="true">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="4" width="18" height="16" rx="3"></rect>
            <path d="M7 9h3"></path>
            <path d="m7 16 4-4 3 3 2-2 3 3"></path>
          </svg>
        </div>

        <h1 id="placeholderTitle">Connecting</h1>
        <p id="placeholderText">Opening the live UCB Eyes viewer.</p>
      </section>
    </main>

    <div class="status warning" id="status">
      <span class="status-dot" aria-hidden="true"></span>
      <span id="statusText">Connecting</span>
    </div>

    <button
      class="fullscreen-button"
      id="fullscreenButton"
      type="button"
      aria-label="Landscape full screen"
      title="Landscape full screen"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.9"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M8 3H3v5"></path>
        <path d="m3 3 6 6"></path>
        <path d="M16 3h5v5"></path>
        <path d="m21 3-6 6"></path>
        <path d="M8 21H3v-5"></path>
        <path d="m3 21 6-6"></path>
        <path d="M16 21h5v-5"></path>
        <path d="m21 21-6-6"></path>
      </svg>
    </button>
  </div>

  <script type="module">
    import { initializeApp } from
      "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";

    import {
      getAuth,
      signInAnonymously
    } from
      "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      onSnapshot,
      getDocFromServer
    } from
      "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtz99nbMN9caeFRnSct6NeugepWQORqvM",
      authDomain: "ucb-eyes.firebaseapp.com",
      projectId: "ucb-eyes",
      storageBucket: "ucb-eyes.firebasestorage.app",
      messagingSenderId: "460479225138",
      appId: "1:460479225138:web:9901e6ae32943663d1cb2b",
      measurementId: "G-WFT6W7H12E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const frame = document.querySelector("#frame");
    const ambient = document.querySelector("#ambient");
    const placeholder = document.querySelector("#placeholder");
    const placeholderTitle = document.querySelector("#placeholderTitle");
    const placeholderText = document.querySelector("#placeholderText");
    const status = document.querySelector("#status");
    const statusText = document.querySelector("#statusText");
    const loading = document.querySelector("#loading");
    const fullscreenButton = document.querySelector("#fullscreenButton");
    const stage = document.querySelector("#stage");

    const currentRef = doc(db, "live_capture", "current");

    let currentVersion = "";
    let latestMetadata = null;
    let loadingVersion = "";
    let lastDisplayedAt = 0;
    let landscapeActive = false;
    let wakeLock = null;

    function setStatus(state, text) {
      status.className = `status ${state}`;
      statusText.textContent = text;
    }

    function setPlaceholder(title, text, visible = true) {
      placeholderTitle.textContent = title;
      placeholderText.textContent = text;
      placeholder.classList.toggle("hidden", !visible);
    }

    function setLoading(active) {
      loading.classList.toggle("active", active);
    }

    function updateConnectionAge() {
      if (!lastDisplayedAt) {
        setStatus("warning", "Waiting for feed");
        return;
      }

      const seconds = Math.floor((Date.now() - lastDisplayedAt) / 1000);

      if (seconds > 15) {
        setStatus("error", `Disconnected · ${seconds}s without a frame`);
      } else if (seconds > 5) {
        setStatus("warning", `Interrupted · ${seconds}s without a frame`);
      } else {
        setStatus("live", "Connected · 1 FPS");
      }
    }

    async function readFrame(metadata, attempt = 0) {
      const version = String(metadata.version || "");
      const chunkCount = Number(metadata.chunkCount || 0);

      if (!version || !Number.isInteger(chunkCount) || chunkCount < 1) {
        setPlaceholder(
          "Waiting for a frame",
          "The publisher is connected, but no complete image is available yet."
        );
        return;
      }

      if (loadingVersion === version && attempt === 0) {
        return;
      }

      loadingVersion = version;
      setLoading(true);

      try {
        const snapshots = await Promise.all(
          Array.from(
            { length: chunkCount },
            (_, index) =>
              getDocFromServer(
                doc(db, "live_capture", `current_chunk_${index}`)
              )
          )
        );

        const parts = snapshots.map((snapshot, index) => {
          if (!snapshot.exists()) {
            throw new Error(`Chunk ${index} is missing`);
          }

          const data = snapshot.data();

          if (String(data.version || "") !== version) {
            throw new Error(`Chunk ${index} belongs to another frame`);
          }

          return String(data.data || "");
        });

        const dataUrl = parts.join("");

        if (!dataUrl.startsWith("data:image/")) {
          throw new Error("The rebuilt frame is not an image");
        }

        if (String(latestMetadata?.version || "") !== version) {
          return;
        }

        await displayFrame(dataUrl);
        currentVersion = version;
      } catch (error) {
        if (attempt < 8) {
          await new Promise(resolve => {
            setTimeout(resolve, 220 + attempt * 150);
          });

          return readFrame(metadata, attempt + 1);
        }

        console.error(error);
        setStatus("error", "Frame unavailable");

        if (!frame.classList.contains("visible")) {
          setPlaceholder(
            "Frame unavailable",
            "The viewer will retry when the publisher sends another frame."
          );
        }
      } finally {
        if (loadingVersion === version) {
          loadingVersion = "";
        }

        setLoading(false);
      }
    }

    function displayFrame(dataUrl) {
      return new Promise((resolve, reject) => {
        const preload = new Image();

        preload.onload = () => {
          frame.src = dataUrl;
          ambient.src = dataUrl;
          frame.classList.add("visible");
          ambient.classList.add("visible");
          setPlaceholder("", "", false);
          lastDisplayedAt = Date.now();
          setStatus("live", "Connected · 1 FPS");
          resolve();
        };

        preload.onerror = () => {
          reject(new Error("The image could not be decoded"));
        };

        preload.src = dataUrl;
      });
    }

    function startListener() {
      onSnapshot(
        currentRef,
        snapshot => {
          if (!snapshot.exists()) {
            latestMetadata = null;
            currentVersion = "";
            setStatus("warning", "Waiting for publisher");
            setPlaceholder(
              "Waiting for the publisher",
              "Start the UCB Eyes capture HTA to publish the first frame."
            );
            return;
          }

          latestMetadata = snapshot.data();
          const version = String(latestMetadata.version || "");

          if (version && version !== currentVersion) {
            readFrame(latestMetadata);
          }
        },
        error => {
          console.error(error);
          setStatus("error", "Disconnected");

          if (!frame.classList.contains("visible")) {
            setPlaceholder(
              "Connection lost",
              "The viewer will continue trying to reconnect."
            );
          }
        }
      );
    }

    async function requestWakeLock() {
      if (!("wakeLock" in navigator)) return;

      try {
        wakeLock = await navigator.wakeLock.request("screen");
      } catch {
        wakeLock = null;
      }
    }

    async function enterLandscape() {
      landscapeActive = true;
      document.body.classList.add("fullscreen-view");

      try {
        if (document.documentElement.requestFullscreen) {
          await document.documentElement.requestFullscreen({
            navigationUI: "hide"
          });
        } else if (document.documentElement.webkitRequestFullscreen) {
          document.documentElement.webkitRequestFullscreen();
        }
      } catch {
        // iOS Safari may not expose element fullscreen.
      }

      let locked = false;

      try {
        if (screen.orientation?.lock) {
          await screen.orientation.lock("landscape");
          locked = true;
        }
      } catch {
        locked = false;
      }

      if (!locked && window.innerHeight > window.innerWidth) {
        document.body.classList.add("force-landscape");
      }

      await requestWakeLock();
    }

    async function exitLandscape() {
      landscapeActive = false;
      document.body.classList.remove("force-landscape");
      document.body.classList.remove("fullscreen-view");

      try {
        if (document.fullscreenElement && document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch {
        // Ignore fullscreen exit failures.
      }

      try {
        screen.orientation?.unlock?.();
      } catch {
        // Ignore orientation unlock failures.
      }

      if (wakeLock) {
        try {
          await wakeLock.release();
        } catch {
          // Ignore wake-lock release failures.
        }

        wakeLock = null;
      }
    }

    async function toggleLandscape() {
      if (landscapeActive) {
        await exitLandscape();
      } else {
        await enterLandscape();
      }
    }

    function updateLandscapeFallback() {
      if (!landscapeActive) return;

      document.body.classList.toggle(
        "force-landscape",
        window.innerHeight > window.innerWidth
      );
    }

    fullscreenButton.addEventListener("click", toggleLandscape);

    stage.addEventListener("click", () => {
      if (landscapeActive) {
        document.body.classList.toggle("fullscreen-view");
      }
    });

    window.addEventListener("resize", updateLandscapeFallback);
    window.addEventListener("orientationchange", () => {
      setTimeout(updateLandscapeFallback, 180);
    });

    window.addEventListener("online", () => {
      setStatus("warning", "Online · reconnecting");
    });

    window.addEventListener("offline", () => {
      setStatus("error", "Disconnected · device offline");
    });

    document.addEventListener("visibilitychange", async () => {
      if (
        document.visibilityState === "visible" &&
        landscapeActive &&
        !wakeLock
      ) {
        await requestWakeLock();
      }
    });

    setInterval(updateConnectionAge, 1000);

    try {
      await signInAnonymously(auth);
      setStatus("warning", "Connected · waiting for frame");
      startListener();
    } catch (error) {
      console.error(error);
      setStatus("error", "Authentication failed");
      setPlaceholder(
        "Authentication failed",
        "Enable Anonymous Authentication in the UCB Eyes Firebase project."
      );
    }
  </script>
</body>
</html>
